version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
      java: corretto17

  build:
    commands:
      - echo "Running Python Program"
      - python python/numbers.py

      - echo "Running Java Program"
      - javac java/HelloWorld.java
      - java -cp java HelloWorld

artifacts:
  files:
    - '**/*'